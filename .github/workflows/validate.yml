name: validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install markdownlint
        run: |
          sudo apt-get update
          sudo apt-get install -y markdownlint
      - name: Lint
        run: markdownlint --version || true

  lint-shell:
    name: Shell Script Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts

  smoke-test-api:
    name: API Smoke Test (no-LLM mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements-api.txt
      - name: Start server in background
        run: |
          nohup python scripts/api/server.py &
          sleep 5
      - name: Health check
        run: |
          curl -fsS http://localhost:8000/health | python -m json.tool
      - name: Generate request (no-LLM mode)
        run: |
          curl -fsS -X POST http://localhost:8000/api/v1/generate \
            -H "Content-Type: application/json" \
            -d '{"destination": "敦煌", "platform": "xiaohongshu", "style": "反差吸引型"}' \
            | python -c "import sys, json; d=json.load(sys.stdin); print('status:', d['status']); print('prompt_to_llm length:', len(d.get('prompt_to_llm') or ''))"
      - name: Destinations endpoint
        run: |
          curl -fsS http://localhost:8000/api/v1/destinations | python -c "import sys, json; print('destinations count:', len(json.load(sys.stdin)['destinations']))"

  smoke-test-image-adapter:
    name: Image Adapter Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --break-system-packages httpx fastapi pydantic
      - name: Run image_adapter imports
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'scripts/api')
          from image_adapter import (
              ImageAdapter, ImageRequest, ImageNotConfiguredError,
              Provider, detect_provider, resolve_model,
          )
          # No keys → must raise
          import os
          for k in ['GOOGLE_API_KEY','OPENAI_API_KEY','OPENROUTER_API_KEY','TSC_IMAGE_PROVIDER']:
              os.environ.pop(k, None)
          try:
              detect_provider()
              raise AssertionError('should have raised')
          except ImageNotConfiguredError:
              pass
          # Each key
          for k,exp in [('GOOGLE_API_KEY','google'),('OPENAI_API_KEY','openai'),('OPENROUTER_API_KEY','openrouter')]:
              for x in ['GOOGLE_API_KEY','OPENAI_API_KEY','OPENROUTER_API_KEY']:
                  os.environ.pop(x, None)
              os.environ[k]='k'
              assert detect_provider().value == exp, f'{k} mismatch'
          # model resolution
          assert resolve_model(Provider.google, 'nano-banana') == 'gemini-3-pro-image-preview'
          assert resolve_model(Provider.openai, None) == 'gpt-image-2'
          assert resolve_model(Provider.openrouter, 'flux-2-max') == 'black-forest-labs/flux-2-max'
          assert resolve_model(Provider.openai, 'my-custom') == 'my-custom'
          print('image_adapter: ALL OK')
          "

  self-check-output-template:
    name: 7-Item Output Self-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run self-check on every example
        run: |
          set -e
          for f in examples/*-output.md; do
            echo "=== $f ==="
            # 1. 8 sections
            n=$(grep -cE "^## " "$f" || true)
            echo "  sections: $n"
            # 2. >= 3 sub-spots
            n=$(grep -cE "^### [1-9]\." "$f" || true)
            echo "  sub-spots: $n"
            # 5. --ar or --v
            n=$(grep -cE '\-\-ar [0-9]|--v 6|--style raw' "$f" || true)
            echo "  AI prompts w/ params: $n"
            # 7. >= 3 references (numbered list)
            n=$(grep -cE "^[0-9]+\. " "$f" || true)
            echo "  numbered references: $n"
          done
